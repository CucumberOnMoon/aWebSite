<script>
// Post content translation via language dropdown
document.addEventListener('DOMContentLoaded', function () {
    var selector = document.getElementById('translate-lang');
    if (!selector) return;

    var contentEl = document.getElementById('post-content');
    var translatedEl = document.getElementById('post-content-translated');
    var statusEl = document.getElementById('translate-status');
    var postId = '{{ post.id }}';

    // Store original content
    var originalContent = contentEl.innerHTML;

    selector.addEventListener('change', function () {
        var lang = this.value;
        var origLang = this.options[0].value;  // first option = original language

        if (lang === origLang) {
            // Show original content (in the original language)
            contentEl.style.display = '';
            translatedEl.style.display = 'none';
            translatedEl.innerHTML = '';
            statusEl.textContent = '';
            return;
        }

        // Check cache
        var cacheKey = 'tr_' + postId + '_' + lang;
        var cached = sessionStorage.getItem(cacheKey);
        if (cached) {
            contentEl.style.display = 'none';
            translatedEl.innerHTML = cached;
            translatedEl.style.display = '';
            statusEl.textContent = '';
            return;
        }

        // Show loading
        statusEl.textContent = 'Translating...';

        fetch('/posts/' + postId + '/translate/?lang=' + lang)
            .then(function (r) {
                if (!r.ok) throw new Error('Translation failed');
                return r.json();
            })
            .then(function (data) {
                if (data.error) {
                    statusEl.textContent = data.error;
                    return;
                }
                // Convert newlines to <br> or <p> tags
                var html = '<p>' + data.content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>') + '</p>';
                sessionStorage.setItem(cacheKey, html);
                contentEl.style.display = 'none';
                translatedEl.innerHTML = html;
                translatedEl.style.display = '';
                statusEl.textContent = '';
            })
            .catch(function (err) {
                statusEl.textContent = 'Translation error. Try again.';
            });
    });
});
</script>
