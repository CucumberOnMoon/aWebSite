<script>
// Voice recording + STT via MediaRecorder + WAV encoding for server compat

var mediaRecorder = null;
var audioChunks = [];
var currentFormId = null;
var recognition = null;
var isSttMode = false;

function toggleRecording(formId) {
    if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecording(); return; }
    isSttMode = false; startRecording(formId);
}

function toggleSttRecording(formId) {
    if (mediaRecorder && mediaRecorder.state === 'recording') { stopRecording(); return; }
    isSttMode = true; startRecording(formId);
}

// ── WAV encoder (pure JS, no ffmpeg needed) ────────────────────
function encodeWAV(samples, sampleRate) {
    var numChannels = 1;
    var bitsPerSample = 16;
    var byteRate = sampleRate * numChannels * bitsPerSample / 8;
    var blockAlign = numChannels * bitsPerSample / 8;
    var dataLength = samples.length * blockAlign;
    var buffer = new ArrayBuffer(44 + dataLength);
    var view = new DataView(buffer);

    function writeString(offset, str) {
        for (var i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
        }
    }

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataLength, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);           // PCM
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(36, 'data');
    view.setUint32(40, dataLength, true);

    var offset = 44;
    for (var i = 0; i < samples.length; i++) {
        var s = Math.max(-1, Math.min(1, samples[i]));
        s = s < 0 ? s * 0x8000 : s * 0x7FFF;
        view.setInt16(offset, s, true);
        offset += 2;
    }
    return new Blob([buffer], { type: 'audio/wav' });
}

// ── Main recording logic ───────────────────────────────────────
var rawSamples = [];
var sampleRate = 16000;

async function startRecording(formId) {
    currentFormId = formId;
    rawSamples = [];
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Set up AudioContext for raw PCM capture
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        sampleRate = audioCtx.sampleRate;
        var source = audioCtx.createMediaStreamSource(stream);
        var processor = audioCtx.createScriptProcessor(4096, 1, 1);

        source.connect(processor);
        processor.connect(audioCtx.destination);

        processor.onaudioprocess = function(e) {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                var input = e.inputBuffer.getChannelData(0);
                for (var i = 0; i < input.length; i++) {
                    rawSamples.push(input[i]);
                }
            }
        };

        // Also use MediaRecorder for backup audio (optional)
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];
        mediaRecorder.ondataavailable = function(e) {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        // ── STT via browser ────────────────────────────────────
        if (isSttMode && (window.SpeechRecognition || window.webkitSpeechRecognition)) {
            var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'auto';

            recognition.onresult = function(event) {
                var transcript = '';
                for (var i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                var textarea = document.querySelector('textarea[name="comment"]');
                if (textarea) textarea.value = transcript;
            };

            recognition.onerror = function(event) {
                var status = document.getElementById('voice-status-' + formId);
                if (status) {
                    if (event.error === 'network') {
                        status.textContent = 'Browser STT blocked. Using server fallback...';
                    } else {
                        status.textContent = 'STT: ' + event.error + '. Trying server...';
                    }
                }
                recognition.stop(); recognition = null;
            };

            recognition.start();
        }

        // ── Stop handler ────────────────────────────────────────
        mediaRecorder.onstop = function() {
            // Stop speech recognition
            if (recognition) { recognition.stop(); recognition = null; }

            // Stop audio processing
            source.disconnect();
            processor.disconnect();
            stream.getTracks().forEach(function(t) { t.stop(); });
            audioCtx.close();

            // Encode raw PCM as WAV for server transcription
            var wavBlob = encodeWAV(rawSamples, sampleRate);
            var wavFile = new File([wavBlob], 'voice-' + Date.now() + '.wav', { type: 'audio/wav' });

            // Also keep WebM for comment attachment
            var webmBlob = new Blob(audioChunks, { type: 'audio/webm' });
            var webmFile = new File([webmBlob], 'voice-' + Date.now() + '.webm', { type: 'audio/webm' });

            // Use WAV for server transcription, WebM for attachment
            var container = new DataTransfer();
            container.items.add(new File([webmBlob], 'voice-' + Date.now() + '.webm', { type: 'audio/webm' }));

            var fileInput = document.getElementById('audio-file-' + formId);
            if (fileInput) fileInput.files = container.files;

            // Update button
            ['voice-btn-' + formId, 'stt-btn-' + formId].forEach(function(id) {
                var btn = document.getElementById(id);
                if (btn) btn.classList.remove('recording');
            });
            var voiceBtn = document.getElementById('voice-btn-' + formId);
            if (voiceBtn) voiceBtn.innerHTML = '&#127897; Voice (recorded)';
            var sttBtn = document.getElementById('stt-btn-' + formId);
            if (sttBtn) sttBtn.innerHTML = '&#9997; STT (done)';

            var status = document.getElementById('voice-status-' + formId);
            if (status) status.textContent = '';

            // ── Server-side STT with WAV ────────────────────────
            if (isSttMode) {
                if (status) status.textContent = 'Transcribing via server...';
                var formData = new FormData();
                formData.append('audio', wavFile, 'recording.wav');
                var postId = window.location.pathname.split('/')[2];
                var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
                var headers = csrfToken ? { 'X-CSRFToken': csrfToken.value } : {};
                fetch('/posts/' + postId + '/transcribe/', { method: 'POST', body: formData, headers: headers })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.text) {
                            var textarea = document.querySelector('textarea[name="comment"]');
                            if (textarea) {
                                var current = textarea.value.trim();
                                textarea.value = current ? current + ' ' + data.text : data.text;
                            }
                            if (status) status.textContent = 'Transcription complete.';
                        } else {
                            if (status) status.textContent = data.error || 'Transcription failed. Type manually.';
                        }
                    })
                    .catch(function() {
                        if (status) status.textContent = 'Server unavailable. Type manually.';
                    });
            }
        };

        mediaRecorder.start();

        // Update UI
        var btnId = isSttMode ? 'stt-btn-' + formId : 'voice-btn-' + formId;
        var btn = document.getElementById(btnId);
        if (btn) { btn.classList.add('recording'); btn.innerHTML = '&#128308; Stop'; }
        var s = document.getElementById('voice-status-' + formId);
        if (s) s.textContent = isSttMode ? 'Recording + Transcribing...' : 'Recording...';

    } catch(e) {
        var s = document.getElementById('voice-status-' + formId);
        if (s) s.textContent = 'Microphone not available';
        console.error(e);
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        mediaRecorder = null;
    }
}
</script>
